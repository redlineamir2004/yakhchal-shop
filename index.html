<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>کنترل انقضا محصولات</title>
<meta name="theme-color" content="#0f6e6e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

<div id="app">

  <!-- ===================== LOGIN ===================== -->
  <div id="login-screen" class="login-screen">
    <div class="login-logo">❄️</div>
    <h1 class="login-title">کنترل انقضا محصولات</h1>
    <p class="login-sub">با حساب کاربری‌تون وارد شوید</p>

    <div class="field">
      <label>ایمیل</label>
      <input type="email" id="login-email" placeholder="example@shop.com" autocomplete="username">
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <p class="error-text" id="login-error"></p>
    <button class="btn btn-primary" id="login-btn">ورود</button>
  </div>

  <!-- ===================== MAIN APP ===================== -->
  <div id="main-app" class="hidden" style="display:flex; flex-direction:column; flex:1;">

    <div class="topbar">
      <h1 id="page-title">محصولات</h1>
      <button class="icon-btn" id="theme-toggle">🌙</button>
    </div>

    <!-- ---- LIST SCREEN ---- -->
    <div id="screen-list" class="screen">
      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:var(--status-green)"></span> بیش از ۳۰ روز</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--status-yellow)"></span> ۱۵ تا ۳۰ روز</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--status-orange)"></span> ۷ تا ۱۵ روز</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--status-red)"></span> زیر ۷ روز</div>
      </div>
      <div id="batch-list"></div>
    </div>

    <!-- ---- ADMIN: MANAGE STAFF ---- -->
    <div id="screen-staff" class="screen hidden">
      <div class="field" style="margin-bottom:14px;">
        <label>افزودن کارمند جدید</label>
      </div>
      <div class="field">
        <label>نام کارمند</label>
        <input type="text" id="staff-name" placeholder="مثلاً: علی رضایی">
      </div>
      <div class="field" style="margin-top:10px;">
        <label>ایمیل ورود</label>
        <input type="email" id="staff-email" placeholder="example@shop.com">
      </div>
      <div class="field" style="margin-top:10px;">
        <label>رمز عبور اولیه</label>
        <input type="password" id="staff-password" placeholder="حداقل ۶ کاراکتر">
      </div>
      <p class="error-text" id="staff-error"></p>
      <button class="btn btn-primary" id="staff-add-btn" style="margin-top:10px;">افزودن کارمند</button>

      <div class="section-title">کارمندان ثبت‌شده</div>
      <div id="staff-list"></div>
    </div>

    <!-- ---- SETTINGS SCREEN ---- -->
    <div id="screen-settings" class="screen hidden">
      <div class="user-chip">
        <div class="user-avatar" id="me-avatar">؟</div>
        <div>
          <div id="me-name" style="font-weight:700; font-size:15px;"></div>
          <span class="role-tag" id="me-role"></span>
        </div>
      </div>
      <button class="btn btn-secondary" id="logout-btn">خروج از حساب</button>
    </div>

    <!-- ---- BOTTOM NAV ---- -->
    <div class="bottom-nav">
      <button class="nav-btn active" data-screen="list">
        <span class="nav-icon">📋</span> محصولات
      </button>
      <button class="nav-btn" id="nav-scan-btn">
        <span class="nav-icon">📷</span> اسکن
      </button>
      <button class="nav-btn hidden" data-screen="staff" id="nav-staff-btn">
        <span class="nav-icon">👥</span> کارمندان
      </button>
      <button class="nav-btn" data-screen="settings">
        <span class="nav-icon">⚙️</span> تنظیمات
      </button>
    </div>
  </div>

</div>

<!-- ===================== SCANNER MODAL ===================== -->
<div id="scanner-modal" class="scanner-modal hidden">
  <button class="scanner-close" id="scanner-close-btn">✕</button>
  <div id="qr-reader"></div>
  <p class="scanner-hint">بارکد محصول رو داخل کادر بگیرید</p>
  <button id="manual-barcode-btn" style="position:absolute; bottom:64px; left:50%; transform:translateX(-50%); z-index:51; background:transparent; border:1px solid #fff; color:#fff; border-radius:999px; padding:8px 16px; font-size:12.5px; font-family:inherit; cursor:pointer;">ورود دستی بارکد</button>

</div>

<!-- ===================== ADD/EDIT SHEET ===================== -->
<div id="sheet-backdrop" class="sheet-backdrop hidden">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title" id="sheet-title">ثبت محصول</h3>

    <div class="field" id="sheet-name-field">
      <label>نام محصول</label>
      <input type="text" id="sheet-product-name" placeholder="مثلاً: شیر پرچرب ۱ لیتری">
    </div>

    <div class="field hidden" id="sheet-name-readonly-field">
      <label>نام محصول</label>
      <div class="list-row"><span class="name" id="sheet-product-name-display"></span></div>
    </div>

    <div class="field">
      <label>تاریخ انقضا</label>
      <input type="date" id="sheet-expiry-date">
    </div>

    <p class="error-text" id="sheet-error"></p>
    <button class="btn btn-primary" id="sheet-save-btn">ذخیره</button>
    <button class="btn btn-danger hidden" id="sheet-delete-btn">حذف این رکورد</button>
    <button class="btn btn-ghost" id="sheet-cancel-btn">انصراف</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Barcode scanner -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>

</body>
</html>
